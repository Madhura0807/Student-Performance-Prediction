{% extends 'base.html' %}
{% block content %}
<div class="row g-4">
    <div class="col-lg-8">
        <div class="card glass-card p-4">
            <h2 class="mb-3">Prediction Result</h2>
            <div class="score-circle mx-auto mb-3">
                <span>{{ prediction }}</span>
            </div>
            <h4 class="text-center">Predicted Math Score</h4>
            <p class="text-center lead">{{ interpretation }}</p>
            <div class="mt-4 d-flex gap-3 justify-content-center flex-wrap">
                <a href="{{ url_for('predict') }}" class="btn btn-primary">Make Another Prediction</a>
                <button class="btn btn-outline-secondary" onclick="window.print()">Download Report</button>
            </div>
        </div>
    </div>
    <div class="col-lg-4">
        <div class="card glass-card p-4">
            <h4>Input Summary</h4>
            <ul class="mt-3">
                {% for key, value in form_data.items() %}
                <li><strong>{{ key }}</strong>: {{ value }}</li>
                {% endfor %}
            </ul>
        </div>
    </div>
</div>
{% endblock %}
